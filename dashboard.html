<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Md Arafat Hosen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .sidebar-link:hover { background: rgba(99, 102, 241, 0.1); border-left: 4px solid #6366f1; }
        .card-gradient { background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%); }
    </style>
</head>
<body class="bg-gray-50 font-sans leading-normal tracking-normal">

    <div class="flex flex-col md:flex-row min-h-screen">
        <aside class="w-full md:w-64 bg-slate-900 text-gray-100 flex-shrink-0">
            <div class="p-6 text-center border-b border-gray-800">
                <span class="text-xl font-bold tracking-wider text-indigo-400">ADMIN PANEL</span>
            </div>
            <nav class="mt-6">
                <a href="#" class="sidebar-link block py-3 px-6 text-gray-300 transition duration-200 bg-slate-800 text-indigo-400">
                    <i class="fas fa-plus-circle mr-3"></i> নতুন পোস্ট
                </a>
                <a href="#" class="sidebar-link block py-3 px-6 text-gray-300 transition duration-200">
                    <i class="fas fa-layer-group mr-3"></i> সব পোস্ট
                </a>
                <a href="#" class="sidebar-link block py-3 px-6 text-gray-300 transition duration-200">
                    <i class="fas fa-cog mr-3"></i> সেটিংস
                </a>
                <button id="logoutBtn" class="w-full text-left py-3 px-6 text-red-400 hover:bg-red-900/20 transition mt-20">
                    <i class="fas fa-sign-out-alt mr-3"></i> লগআউট
                </button>
            </nav>
        </aside>

        <main class="flex-1 overflow-x-hidden overflow-y-auto bg-gray-100 p-6">
            <div class="container mx-auto">
                <div class="flex justify-between items-center mb-8">
                    <h1 class="text-3xl font-bold text-gray-800">ব্লগ পাবলিশার</h1>
                    <div class="flex items-center space-x-4">
                        <span class="text-sm text-gray-500">স্বাগতম, Md Arafat</span>
                        <img src="https://ui-avatars.com/api/?name=Md+Arafat&background=6366f1&color=fff" class="w-10 h-10 rounded-full border-2 border-white shadow-sm">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200 flex items-center">
                        <div class="p-4 bg-indigo-50 rounded-xl mr-4"><i class="fas fa-file-alt text-indigo-600"></i></div>
                        <div><p class="text-sm text-gray-500">মোট পোস্ট</p><p class="text-xl font-bold">১২</p></div>
                    </div>
                </div>

                <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
                    <div class="p-6 border-b border-gray-100 flex justify-between items-center">
                        <h3 class="text-lg font-semibold text-gray-700">কন্টেন্ট এডিটর</h3>
                        <span class="text-xs bg-green-100 text-green-700 px-3 py-1 rounded-full font-medium">অটো-সেভ অন</span>
                    </div>
                    
                    <div class="p-8 space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="space-y-2">
                                <label class="text-sm font-semibold text-gray-600">পোস্ট টাইটেল</label>
                                <input type="text" id="postTitle" placeholder="টাইটেল এখানে লিখুন..." class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition">
                            </div>
                            <div class="space-y-2">
                                <label class="text-sm font-semibold text-gray-600">ইউআরএল স্লাগ (Slug)</label>
                                <div class="flex">
                                    <span class="p-3 bg-gray-200 text-gray-500 rounded-l-xl border border-r-0 border-gray-200 text-sm">/posts/</span>
                                    <input type="text" id="postSlug" placeholder="post1" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-r-xl focus:ring-2 focus:ring-indigo-500 outline-none transition">
                                </div>
                            </div>
                        </div>

                        <div class="space-y-2">
                            <label class="text-sm font-semibold text-gray-600">ব্লগ কন্টেন্ট (HTML সমর্থিত)</label>
                            <textarea id="postContent" rows="10" placeholder="আপনার ব্লগের বিস্তারিত লিখুন..." class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition"></textarea>
                        </div>

                        <div class="flex justify-end pt-4">
                            <button id="publishBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-10 rounded-xl shadow-lg shadow-indigo-200 transition transform active:scale-95">
                                <i class="fas fa-paper-plane mr-2"></i> পাবলিশ করুন
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    </body>
</html>
